<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💌 Um Pedido Especial</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-hot: #ec4899; --lilac-mid: #c084fc; --lilac-deep: #a855f7;
      --glass-bg: rgba(255,255,255,0.55); --glass-blur: blur(18px);
      --transition: all 0.35s cubic-bezier(.4,0,.2,1);
    }
    html, body { min-height: 100dvh; font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #f5d0fe 40%, #ede9fe 100%); color: #3b1051; overflow-x: hidden; }
    #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 32px 20px; text-align: center; animation: fadeIn .5s ease forwards; }
    .screen.active { display: flex; }
    .card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(168,85,247,.18); }
    .title { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--pink-hot), var(--lilac-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn { cursor: pointer; border: none; border-radius: 50px; padding: 14px 36px; font-weight: 800; transition: var(--transition); }
    .btn-yes { background: var(--pink-hot); color: #fff; }
    .styled-input { width: 100%; padding: 13px; border: 2px solid var(--lilac-mid); border-radius: 14px; margin: 10px 0; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
    .option-btn { background: rgba(255,255,255,.7); border: 2px solid var(--lilac-mid); padding: 10px; border-radius: 12px; cursor: pointer; }
    .option-btn.selected { background: var(--lilac-mid); color: white; }
    .summary-row { background: rgba(255,255,255,.6); padding: 10px; border-radius: 10px; margin: 5px 0; text-align: left; }
    .heart-float { position: fixed; pointer-events: none; animation: floatUp linear forwards; }
    @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<section id="screen-1" class="screen active">
  <div class="card">
    <h1 class="title">Você aceita sair comigo?</h1>
    <div style="margin-top: 20px;">
      <button class="btn btn-yes" onclick="handleYes()">Sim 💕</button>
      <button class="btn" id="btn-no" style="margin-left: 10px;">Não 🙈</button>
    </div>
  </div>
</section>

<section id="screen-2" class="screen">
  <div class="card">
    <h1 class="title">Quando?</h1>
    <input id="date-input" type="date" class="styled-input" />
    <input id="time-input" type="time" class="styled-input" />
    <button class="btn btn-yes" onclick="handleDate()">Avançar</button>
  </div>
</section>

<section id="screen-3" class="screen">
  <div class="card">
    <h1 class="title">Preferências</h1>
    <p>Comida:</p>
    <div class="options-grid" id="food-options">
      <button class="option-btn" data-group="food" onclick="selectOption(this)">Sushi 🍣</button>
      <button class="option-btn" data-group="food" onclick="selectOption(this)">Pizza 🍕</button>
    </div>
    <p>Vibe:</p>
    <div class="options-grid" id="vibe-options">
      <button class="option-btn" data-group="vibe" onclick="selectOption(this)">Praia 🏖️</button>
      <button class="option-btn" data-group="vibe" onclick="selectOption(this)">Cinema 🎬</button>
    </div>
    <button class="btn btn-yes" onclick="handlePrefs()">Bora!!! 🚀</button>
  </div>
</section>

<section id="screen-4" class="screen">
  <div class="card">
    <h1 class="title">Tudo combinado!</h1>
    <div id="summary-content"></div>
  </div>
</section>

<script>
  const state = { date: '', time: '', food: '', vibe: '' };
  const btnNo = document.getElementById('btn-no');

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function handleYes() { goTo('screen-2'); }

  btnNo.addEventListener('mouseover', () => {
    btnNo.style.position = 'fixed';
    btnNo.style.left = Math.random() * 80 + 'vw';
    btnNo.style.top = Math.random() * 80 + 'vh';
  });

  function handleDate() {
    state.date = document.getElementById('date-input').value;
    state.time = document.getElementById('time-input').value;
    if(!state.date || !state.time) return alert('Preencha tudo!');
    goTo('screen-3');
  }

  function selectOption(btn) {
    document.querySelectorAll(`.option-btn[data-group="${btn.dataset.group}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state[btn.dataset.group] = btn.innerText;
  }

  function handlePrefs() {
    if(!state.food || !state.vibe) return alert('Escolha as opções!');
    
    const msg = `Aceitei o convite! Data: ${state.date} às ${state.time}. Escolhi: ${state.food} e ${state.vibe}`;
    const url = `https://wa.me/5511973513832?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
    
    document.getElementById('summary-content').innerHTML = `<p>${msg}</p>`;
    goTo('screen-4');
  }
</script>
</body>
</html>
